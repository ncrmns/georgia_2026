name: Georgia
options:
  bundleIdPrefix: com.yourapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""   # ← fill in your Team ID

targets:

  Georgia:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Georgia
        excludes:
          - "**/*.entitlements"
    entitlements:
      path: Georgia/Georgia.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yourapp.georgia
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourapp.georgia
        INFOPLIST_FILE: Georgia/Info.plist
    info:
      path: Georgia/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSLocationWhenInUseUsageDescription: "Used to detect departure and arrival during travel events."
        NSSupportsLiveActivities: true
    dependencies:
      - target: GeorgiaActivityExtension

  GeorgiaActivityExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GeorgiaActivityExtension
        excludes:
          - "**/*.entitlements"
    entitlements:
      path: GeorgiaActivityExtension/GeorgiaActivityExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yourapp.georgia
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourapp.georgia.activity
        INFOPLIST_FILE: GeorgiaActivityExtension/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
    info:
      path: GeorgiaActivityExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
