<!DOCTYPE html>
<html lang="en" style="--header-h:130px">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Georgia 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>var exports = {};</script>
  <script src="https://cdn.jsdelivr.net/npm/open-location-code/openlocationcode.js"></script>
  <script>var OLC = new exports.OpenLocationCode();</script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0c0c0e;
      --surface:    #1a1a1f;
      --surface2:   #242429;
      --border:     #2e2e35;
      --text:       #f0f0f5;
      --muted:      #6b6b78;
      --accent:     #ff9f0a;
      --accent-dim: rgba(255,159,10,.12);
      --green:      #34c759;
      --orange:     #ff9f0a;
      --red:        #ff453a;
      --purple:     #bf5af2;
      --radius:     14px;
      --radius-sm:  8px;
    }

    html { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; font-size: 16px; }
    body { min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }

    /* ── Layout ── */
    .app { max-width: 480px; margin: 0 auto; padding: calc(var(--header-h, 110px) + 8px) 16px 100px; }

    /* ── Header ── */
    .header-sticky {
      position: fixed; top: 0; left: 0; right: 0; z-index: 400;
      background: var(--bg); padding: 0 16px;
      transition: background .2s;
    }
    .header-sticky.map-open { background: transparent; }
    .header { padding: 16px 0 16px; display: flex; flex-direction: column; gap: 4px; max-width: 480px; margin: 0 auto; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .trip-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .trip-date  { font-size: 14px; color: var(--muted); margin-top: 2px; }
    .lock-btn   {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); border-radius: 50%; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    @media (hover: hover) { .lock-btn:hover { color: var(--accent); border-color: var(--accent); } }
    .lock-btn.active { color: var(--accent); border-color: var(--accent); }
    .lock-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; }

    /* ── Admin bar ── */
    .admin-bar {
      background: var(--accent-dim); border: 1px solid var(--accent);
      border-radius: var(--radius-sm); padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; display: none;
    }
    .admin-bar.visible { display: flex; }
    .admin-bar span { font-size: 13px; color: var(--accent); font-weight: 600; }
    .add-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); padding: 6px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }

    /* ── Section labels ── */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: .8px;
      color: var(--muted); text-transform: uppercase; margin: 24px 0 10px;
    }

    /* ── Event cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      position: relative; transition: border-color .2s;
    }
    .card + .card { margin-top: 8px; }
    .card.current  { border-color: var(--accent); background: #1a1508; }
    .card.late     { border-color: var(--red); }
    .card.done     { opacity: .5; }
    .card.dimmed   { opacity: .6; }

    .card-header { display: flex; align-items: flex-start; gap: 10px; }
    .card-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; margin-top: 1px;
    }
    .card-icon svg { width: 16px; height: 16px; stroke-width: 2; }
    .icon-deadline svg { stroke: var(--red); }
    .icon-travel   svg { stroke: var(--accent); }
    .icon-activity svg { stroke: var(--accent); }
    .icon-deadline { background: rgba(255,69,58,.12); }
    .icon-travel   { background: var(--accent-dim); }
    .icon-activity { background: var(--accent-dim); }

    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-size: 16px; font-weight: 600; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card.current .card-title { font-size: 18px; }

    .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
    .card-time { font-size: 13px; color: var(--muted); }
    .status-badge {
      font-size: 11px; font-weight: 700; padding: 2px 7px;
      border-radius: 20px; letter-spacing: .3px;
    }
    .badge-late     { background: rgba(255,69,58,.2);  color: var(--red); }
    .badge-done     { background: rgba(52,199,89,.2);  color: var(--green); }
    .badge-active   { background: rgba(255,159,10,.15); color: var(--accent); }
    .badge-upcoming { background: var(--surface2);     color: var(--muted); }
    .starts-in { font-size: 12px; color: var(--accent); font-weight: 600; margin-left: auto; }

    /* ── Progress bar ── */
    .progress-wrap { margin-top: 12px; }
    .progress-track {
      height: 8px; background: var(--surface2);
      border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 80%, #fff));
      transition: width .5s ease; position: relative; overflow: hidden;
    }
    .progress-fill::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        color-mix(in srgb, #fff 35%, transparent) 50%,
        transparent 100%);
      transform: translateX(-100%);
      animation: bar-sweep 2.5s ease-in-out infinite;
    }
    .progress-fill.late {
      background: linear-gradient(90deg, var(--red), color-mix(in srgb, var(--red) 80%, #fff));
    }
    @keyframes bar-sweep {
      0%   { transform: translateX(-100%); opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateX(100%); opacity: 0; }
    }
    .progress-labels {
      display: flex; justify-content: space-between;
      margin-top: 4px;
    }
    .progress-labels span { font-size: 11px; color: var(--muted); }

    /* ── Notes ── */
    .card-notes {
      margin-top: 12px; padding: 10px 12px;
      background: var(--surface2); border-radius: var(--radius-sm);
      font-size: 13px; color: var(--text); line-height: 1.5;
      white-space: pre-wrap; word-break: break-word;
    }
    .card-notes-label {
      font-size: 10px; font-weight: 700; letter-spacing: .5px;
      color: var(--muted); text-transform: uppercase; margin-bottom: 4px;
    }
    .card-location-row {
      display: flex; align-items: center; gap: 8px; margin-top: 8px;
    }
    .card-location {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--muted);
      text-decoration: none; flex: 1;
    }
    .card-location:hover { color: var(--text); }
    .card-location svg { width: 12px; height: 12px; flex-shrink: 0; }
    .loc-distance {
      font-size: 12px; color: var(--muted);
    }

    /* ── Pinned notes ── */
    .pinned-notes { margin-bottom: 4px; position: relative; z-index: 60; }
    .pinned-note {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px; color: var(--muted);
    }
    .pinned-note:last-child { border-bottom: none; }
    .pinned-note-text { flex: 1; color: var(--text); }
    .pinned-note-icon { width: 13px; height: 13px; stroke: var(--accent); flex-shrink: 0; pointer-events: none; }
    .is-admin .pinned-note[data-note-id] { -webkit-user-select: none; user-select: none; touch-action: none; cursor: grab; -webkit-touch-callout: none; }
    .is-admin .pinned-note[data-note-id]:active { cursor: grabbing; }
    .is-admin .pinned-note[data-note-id] button,
    .is-admin .pinned-note[data-note-id] a { cursor: pointer; }
    .drag-handle {
      display: none; color: var(--muted); opacity: .4; padding: 0 2px;
    }
    .drag-handle svg { width: 14px; height: 14px; stroke: currentColor; pointer-events: none; }
    .is-admin .drag-handle { display: flex; align-items: center; }
    .is-admin .pinned-note[data-note-id] { cursor: grab; }
    .is-admin .pinned-note[data-note-id]:active { cursor: grabbing; }
    .pinned-note.drag-over { border-top: 2px solid var(--accent); }
    .pinned-note-address {
      display: flex; align-items: center; gap: 6px; flex: 1;
      color: var(--text); text-decoration: none; font-size: 14px;
    }
    .pinned-note-address:hover { color: var(--accent); }
    .pinned-note-address svg { width: 13px; height: 13px; flex-shrink: 0; stroke: var(--accent); }
    .pinned-note-address span { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-right: 2px; }
    .pinned-note-del {
      display: none; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 14px; padding: 0 4px;
      opacity: 0.5;
    }
    .pinned-note-del:hover { opacity: 1; color: var(--red); }
    .is-admin .pinned-note-del { display: block; }

    /* ── Admin actions on card ── */
    .card-actions {
      display: none; gap: 6px; margin-top: 12px; flex-wrap: wrap;
    }
    .is-admin .card-actions { display: flex; }
    .action-btn {
      font-size: 12px; font-weight: 600; padding: 5px 11px;
      border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); cursor: pointer;
      transition: all .15s;
    }
    .action-btn:hover        { border-color: var(--accent); color: var(--accent); }
    .action-btn.danger       { border-color: var(--red);    color: var(--red); }
    .action-btn.danger:hover { border-color: var(--red);    color: var(--red); opacity: .8; }
    .action-btn.success      { border-color: var(--green);  color: var(--green); }
    .action-btn.advance      { border-color: var(--accent); color: var(--accent); }
    .action-btn.edit         { border-color: var(--text);   color: var(--text); }
    .action-btn.edit:hover   { border-color: #fff;          color: #fff; }
    .action-btn svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; margin-right: 4px; vertical-align: middle; }
    .modal-close svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; }
    .pinned-note-del svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.5; }
    .admin-bar svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; margin-right: 4px; vertical-align: middle; }

    /* ── Day separator ── */
    .day-header {
      font-size: 12px; font-weight: 700; letter-spacing: .5px;
      color: var(--muted); text-transform: uppercase;
      padding: 20px 0 8px; display: flex; align-items: center; gap: 10px;
    }
    .day-header::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .day-header.collapsible { cursor: pointer; user-select: none; }
    .day-header.collapsible:hover { opacity: .8; }
    .day-chevron { margin-left: 2px; transition: transform .25s ease; flex-shrink: 0; }
    .day-chevron svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2.5; }
    .day-header.collapsed .day-chevron { transform: rotate(-90deg); }
    .day-cards { overflow: hidden; }
    .day-cards.collapsed { display: none; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: none; align-items: flex-end; justify-content: center;
      z-index: 100; padding: 0;
    }
    .modal-overlay.open { display: flex; }
    /* ── Map overlay ── */
    #mapOverlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: #0c0c0e;
    }
    #mapOverlay.open { display: block; }
    #mapContainer { width: 100%; height: 100%; }
    .map-controls {
      position: fixed; top: var(--map-controls-top, 90px); right: var(--map-controls-right, 16px); z-index: 450;
      display: flex; flex-direction: column; gap: 8px; align-items: center;
      width: var(--map-controls-width, 36px); padding-top: 6px;
    }
    .map-controls > * {
      animation: map-btn-in .35s cubic-bezier(0.22,1,0.36,1) both;
    }
    .map-controls > *:nth-child(1) { animation-delay: 0ms; }
    .map-controls > *:nth-child(2) { animation-delay: 60ms; }
    .map-controls > *:nth-child(3) { animation-delay: 110ms; }
    .map-controls.closing > * {
      animation: map-btn-in .25s cubic-bezier(0.55,0,1,0.45) both reverse;
    }
    .map-controls.closing > *:nth-child(1) { animation-delay: 110ms; }
    .map-controls.closing > *:nth-child(2) { animation-delay: 60ms; }
    .map-controls.closing > *:nth-child(3) { animation-delay: 0ms; }
    @keyframes map-btn-in {
      from { opacity: 0; transform: translateY(calc(-1 * (var(--map-controls-top, 90px)))); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .map-zoom-group {
      display: flex; flex-direction: column;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
      overflow: hidden;
    }
    .map-zoom-group .map-zoom-btn {
      background: none; border: none; border-radius: 0; width: 36px; height: 36px;
    }
    .map-zoom-group .map-zoom-btn + .map-zoom-btn {
      border-top: 1px solid var(--border);
    }
    #mapLocationsPanel {
      position: absolute; top: var(--header-h, 130px); left: 0; bottom: 0; width: 300px; z-index: 10;
      background: transparent; border-right: none;
      display: flex; flex-direction: column; transform: translateX(-100%);
      transition: transform .25s ease; pointer-events: none;
    }
    #mapLocationsPanel.open { transform: translateX(0); }
    #mapLocationsPanel > * { pointer-events: auto; }
    .map-admin-only { display: none; }
    .is-admin .map-admin-only { display: flex; }
    #mapLocList { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; direction: rtl; }
    #mapLocList > * { direction: ltr; }
    .map-loc-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(28,28,30,.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 10px 12px; cursor: pointer;
    }
    .map-loc-row.editing { flex-direction: column; align-items: stretch; gap: 6px; cursor: default; }
    .map-loc-icon-wrap {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .map-loc-icon-wrap svg { width: 14px; height: 14px; stroke: currentColor; }
    .map-loc-info { flex: 1; min-width: 0; }
    .map-loc-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .map-loc-addr { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .map-loc-dist { font-size: 11px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
    .map-loc-row.hidden-loc .map-loc-name,
    .map-loc-row.hidden-loc .map-loc-addr { opacity: .4; }
    .map-loc-category-header {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px 4px;
      font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      border-top: 1px solid;
      margin-top: 4px;
    }
    .map-loc-category-header:first-child { border-top: none; margin-top: 0; }
    .map-loc-category-icon svg { width: 12px; height: 12px; stroke: currentColor; display: block; }
    .map-loc-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .map-loc-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      color: var(--muted); border-radius: 6px; display: flex; align-items: center;
    }
    .map-loc-btn:hover { background: var(--surface2); color: var(--text); }
    .map-loc-btn svg { width: 14px; height: 14px; }
    .map-loc-edit-fields { display: flex; flex-direction: column; gap: 4px; }
    .map-loc-edit-fields input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 8px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; width: 100%; box-sizing: border-box;
    }
    .map-loc-edit-fields input:focus { border-color: var(--accent); }
    .map-loc-edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .map-loc-edit-actions button {
      font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    }
    .map-loc-edit-actions .save-btn { border-color: var(--accent); color: var(--accent); }
    .map-loc-add {
      padding: 12px; border-top: 1px solid rgba(255,255,255,.08); display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
      background: rgba(28,28,30,.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .map-loc-add input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 8px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; width: 100%; box-sizing: border-box;
    }
    .map-loc-add input:focus { border-color: var(--accent); }
    .map-loc-add button {
      align-self: flex-end; font-size: 12px; font-weight: 600; padding: 4px 14px;
      border-radius: 6px; cursor: pointer; border: 1px solid var(--accent); background: var(--accent-dim); color: var(--accent);
    }
    .map-marker-icon {
      --mc: #ff9f0a;
      width: 28px; height: 28px; border-radius: 50%;
      background: color-mix(in srgb, var(--mc) 15%, transparent);
      border: 2px solid var(--mc);
      display: flex; align-items: center; justify-content: center;
      color: var(--mc); cursor: pointer;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--mc) 25%, transparent), 0 0 10px color-mix(in srgb, var(--mc) 35%, transparent);
      transition: width .2s, height .2s, background .2s, box-shadow .2s;
    }
    .map-marker-icon svg { width: 13px; height: 13px; stroke: var(--mc); transition: opacity .15s; }
    .map-zoom-far .map-marker-icon {
      width: 10px; height: 10px;
      background: var(--mc); border: none;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--mc) 35%, transparent);
    }
    .map-zoom-far .map-marker-icon svg { opacity: 0; width: 0; height: 0; }
    .loc-icon-picker { display: flex; gap: 6px; flex-wrap: wrap; padding: 4px 0; }
    .loc-icon-opt {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted);
    }
    .loc-icon-opt svg { width: 14px; height: 14px; }
    .loc-icon-opt.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .loc-icon-opt.selected svg { stroke: var(--accent); }
    .map-marker.pin {
      width: 10px; height: 10px;
      background: var(--accent); opacity: .8;
    }
    /* Override MapLibre popup to match app theme */
    .maplibregl-popup-content {
      background: var(--surface2) !important; color: var(--text) !important;
      border: 1px solid var(--border) !important; border-radius: 8px !important;
      padding: 8px 12px !important; font-family: inherit !important;
      font-size: 13px !important; box-shadow: none !important;
    }
    .maplibregl-popup-tip { display: none !important; }
    .maplibregl-ctrl-attrib { font-size: 9px !important; opacity: .4; }
    @keyframes map-pulse {
      0%   { transform: scale(1);   opacity: .4; }
      70%  { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px 40px; width: 100%; max-width: 480px;
      max-height: 90dvh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--surface2); border: none; color: var(--muted);
      border-radius: 50%; width: 28px; height: 28px; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-sm); padding: 10px 12px;
      font-size: 16px; outline: none; font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
    }
    .field textarea { min-height: 80px; resize: vertical; }
    .field select option { background: var(--surface2); }
    .loc-suggestions {
      position: absolute; left: 0; right: 0; top: calc(100% + 4px);
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      z-index: 200; overflow: hidden;
    }
    .loc-suggestion {
      padding: 10px 12px; font-size: 13px; cursor: pointer; color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    .loc-suggestion:last-child { border-bottom: none; }
    .loc-suggestion:hover, .loc-suggestion.active { background: var(--surface); color: var(--accent); }
    .loc-suggestion small { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }
    .poi-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
    .poi-row:last-child { margin-bottom: 0; }
    .poi-remove { width: 32px; height: 38px; flex-shrink: 0; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .poi-remove svg { width: 14px; height: 14px; }
    @media (hover: hover) { .poi-remove:hover { border-color: var(--red); color: var(--red); } }
    .add-poi-btn { margin-top: 8px; background: none; border: 1px dashed var(--border); border-radius: var(--radius-sm); color: var(--muted); font-size: 12px; padding: 7px 12px; cursor: pointer; width: 100%; text-align: left; }
    @media (hover: hover) { .add-poi-btn:hover { border-color: var(--accent); color: var(--accent); } }
    .loc-name-input { margin-top: 6px; font-size: 12px; color: var(--muted); }
    .poi-name-input { margin-top: 4px; font-size: 12px; color: var(--muted); }
    .field-row { display: flex; flex-direction: column; gap: 12px; }

    .type-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .type-option {
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 8px; text-align: center; cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--muted);
      transition: all .15s;
    }
    .type-option.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .type-icon-lbl { font-size: 20px; display: flex; justify-content: center; margin-bottom: 4px; }
    .type-icon-lbl svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.75; }
    .type-option.selected .type-icon-lbl svg { stroke: var(--accent); }
    .type-option:not(.selected) .type-icon-lbl svg { stroke: var(--muted); }

    /* ── Icon picker ── */
    .icon-picker { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .icon-quick {
      font-size: 20px; width: 40px; height: 40px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: border-color .15s;
    }
    .icon-quick:hover, .icon-quick.selected { border-color: var(--accent); background: var(--accent-dim); }
    .icon-quick svg { width: 18px; height: 18px; stroke: var(--muted); stroke-width: 1.75; }
    .icon-quick.selected svg, .icon-quick:hover svg { stroke: var(--accent); }
    .icon-custom-input {
      flex: 1; min-width: 60px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-sm); padding: 8px 10px;
      font-size: 20px; outline: none; text-align: center;
    }
    .icon-custom-input:focus { border-color: var(--accent); }
    .icon-custom-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Travel vehicle picker ── */
    .vehicle-picker { display: flex; gap: 8px; }
    .vehicle-opt {
      flex: 1; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px; text-align: center; cursor: pointer; font-size: 13px;
      font-weight: 600; color: var(--muted); transition: all .15s;
    }
    .vehicle-opt.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .vehicle-opt span { font-size: 22px; display: block; margin-bottom: 3px; }
    .vehicle-opt svg { width: 22px; height: 22px; stroke: var(--muted); stroke-width: 1.75; display: block; margin: 0 auto 3px; }
    .vehicle-opt.selected svg, .vehicle-opt:hover svg { stroke: var(--accent); }

    /* ── Color accent picker ── */
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-dot {
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all .15s; flex-shrink: 0;
      position: relative;
    }
    .color-dot.selected { border-color: #fff; transform: scale(1.2); }
    .color-dot.none {
      background: var(--surface2); border: 2px solid var(--border);
    }
    .color-dot.none.selected { border-color: var(--muted); }

    /* ── Card color accent (left stripe + bg tint) ── */
    .card.has-color::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 2px 0 0 2px;
      background: var(--card-color, transparent);
    }
    .card.has-color {
      padding-left: 20px; overflow: hidden;
      background-color: color-mix(in srgb, var(--card-color, transparent) 7%, var(--surface));
    }
    .card.has-color.current {
      background-color: color-mix(in srgb, var(--card-color, transparent) 10%, #1a1508);
    }

    .save-btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); padding: 14px; font-size: 16px;
      font-weight: 700; cursor: pointer; margin-top: 8px;
    }
    .save-btn:disabled { opacity: .4; cursor: default; }

    /* ── Admin mode feel ── */
    .is-admin {
      background: #0e0c09;
    }
    .is-admin .app {
      border-left: 1px solid rgba(255,159,10,.08);
      border-right: 1px solid rgba(255,159,10,.08);
    }
    .is-admin .card {
      border-color: rgba(255,159,10,.25);
      cursor: pointer;
    }
    .is-admin .card:hover {
      border-color: rgba(255,159,10,.6);
      background: #1e1a10;
    }
    .is-admin .card.current {
      border-color: var(--orange);
      background: #1a1508;
    }
    .is-admin .section-label {
      color: rgba(255,159,10,.6);
    }
    .is-admin .day-header {
      color: rgba(255,159,10,.5);
    }
    .is-admin .day-header::after {
      background: rgba(255,159,10,.15);
    }
    .admin-bar {
      position: sticky; top: var(--header-h, 130px); z-index: 50;
      background: #1a1200;
      border: 1px solid var(--orange);
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      border-top: none;
      box-shadow: 0 4px 24px rgba(255,159,10,.15);
    }
    .admin-bar span { color: var(--orange); }
    .add-btn { background: var(--orange); }
    .lock-btn.active {
      color: var(--orange);
      border-color: var(--orange);
      box-shadow: 0 0 10px rgba(255,159,10,.3);
    }

    /* ── Day color bands ── */
    .day-header { color: var(--accent); }
    .day-header::after { background: color-mix(in srgb, var(--accent) 30%, transparent); }
    .day-band-0 .card:not(.has-color) { border-left: 2px solid color-mix(in srgb, var(--day0) 35%, transparent); }
    .day-band-1 .card:not(.has-color) { border-left: 2px solid color-mix(in srgb, var(--day1) 35%, transparent); }
    .day-band-2 .card:not(.has-color) { border-left: 2px solid color-mix(in srgb, var(--day2) 35%, transparent); }
    .day-band-3 .card:not(.has-color) { border-left: 2px solid color-mix(in srgb, var(--day3) 35%, transparent); }

    /* ── Type-specific card borders ── */
    .card.type-deadline { border-left-width: 3px; border-left-color: var(--red); }

    /* ── Status visual: NOW glow, past fade ── */
    .card.current {
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--accent) 60%, transparent),
        0 0 20px 0px color-mix(in srgb, var(--accent) 25%, transparent),
        0 0 60px 0px color-mix(in srgb, var(--accent) 10%, transparent);
      animation: glow-pulse 4s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent),
          0 0 14px 0px color-mix(in srgb, var(--accent) 15%, transparent),
          0 0 40px 0px color-mix(in srgb, var(--accent) 5%, transparent);
      }
      50% {
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--accent) 80%, transparent),
          0 0 28px 4px color-mix(in srgb, var(--accent) 35%, transparent),
          0 0 70px 8px color-mix(in srgb, var(--accent) 12%, transparent);
      }
    }
    .card.done   { opacity: .35; filter: saturate(.4); }
    .card.dimmed { opacity: .5;  filter: saturate(.5); }


    /* ── Travel card route display ── */
    .travel-route {
      display: flex; align-items: center; gap: 8px;
      margin-top: 6px; font-size: 13px;
    }
    .travel-city { font-weight: 600; color: var(--text); }
    .travel-arrow { color: var(--muted); font-size: 16px; flex: 1; text-align: center; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .travel-arrow svg { width: 16px; height: 16px; stroke: var(--muted); stroke-width: 1.75; flex-shrink: 0; }

    /* ── Refresh indicator ── */
    .refresh-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); display: inline-block; margin-left: 7px;
      animation: pulse 2s infinite; vertical-align: middle;
    }
    .refresh-dot.offline {
      background: var(--muted);
      animation: none;
      opacity: .5;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .3; }
    }

    /* ── Countdown ── */
    .countdown { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .countdown strong { color: var(--accent); }
    .geo-status { display: block; font-size: 11px; color: var(--muted); background: none; }
    .geo-status.error { color: var(--red); }

    /* ── Card entrance ── */
    @keyframes card-in {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      opacity: 0;
      animation: card-in .35s ease forwards;
    }

    /* ── Progress bar fill ── */
    @keyframes fill-in {
      from { width: 0 !important; }
    }
    .animate-fill {
      animation: fill-in .8s cubic-bezier(.4,0,.2,1) forwards;
    }

    /* ── Done badge pop ── */
    @keyframes badge-pop {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.2); }
      100% { transform: scale(1);   opacity: 1; }
    }
    .badge-done { animation: badge-pop .3s ease forwards; }

    /* ── Lock button flip ── */
    @keyframes lock-flip {
      0%   { transform: rotateY(0); }
      50%  { transform: rotateY(90deg); }
      100% { transform: rotateY(0); }
    }
    .lock-flip { animation: lock-flip .3s ease; }
  </style>
</head>
<body>

<div class="header-sticky" id="appHeader">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="trip-title" id="tripTitle">Loading…</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="trip-date" id="tripDate"></div>
          <span class="refresh-dot" id="refreshDotInline"></span>
        </div>
        <div class="countdown" id="countdown"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="lock-btn" id="copyBtn" title="Copy page URL"><i data-lucide="link"></i></button>
        <button class="lock-btn" id="lockBtn" title="Admin login"><i data-lucide="plus"></i></button>
        <button class="lock-btn" id="navBtn" title="Toggle location" onclick="toggleGlobalLocation()"><i data-lucide="navigation"></i></button>
        <button class="lock-btn" id="mapBtn" title="Map view" onclick="toggleMap()"><i id="mapBtnIcon" data-lucide="map"></i></button>
      </div>
    </div>
  </div>
</div>
<div class="app" id="app">
  <div id="pinnedSection"></div>
  <div class="admin-bar" id="adminBar">
    <span><i data-lucide="plus"></i>Admin mode</span>
    <button class="add-btn" id="addEventBtn">+ Add event</button>
  </div>
  <div id="pastSection"></div>
  <div id="todayPastSection"></div>
  <div id="currentSection"></div>
  <div id="scheduleSection"></div>
  <div class="geo-status" id="geoStatus" style="padding:8px 0 4px;text-align:center"></div>
</div>

<!-- Map controls (outside overlay so z-index isn't capped by overlay stacking context) -->
<div class="map-controls" id="mapControls" style="display:none">
  <div class="map-zoom-group">
    <button class="lock-btn map-zoom-btn" id="mapNavBtn" onclick="mapNavAction()" title="Street level"><i data-lucide="navigation"></i></button>
    <button class="lock-btn map-zoom-btn" id="mapLandmarkBtn" onclick="mapZoomNeighbourhood()" title="Neighbourhood view"><i data-lucide="landmark"></i></button>
    <button class="lock-btn map-zoom-btn" id="mapGlobeBtn" onclick="mapZoomOut()" title="Fit all points"><i data-lucide="globe"></i></button>
  </div>
  <button class="lock-btn" id="mapLocBtn" onclick="toggleMapLocations()" title="Map locations"><i data-lucide="list"></i></button>
  <button class="lock-btn map-admin-only" id="mapLocEditBtn" onclick="toggleMapLocEdit()" title="Edit locations"><i data-lucide="pencil"></i></button>
</div>
<!-- Event editor modal -->
<div id="mapOverlay">
  <div id="mapLocationsPanel">
    <div id="mapLocList"></div>
    <div class="map-loc-add" id="mapLocAddForm" style="display:none">
      <div id="mapLocIconPicker"></div>
      <input type="hidden" id="mapLocIcon" value="map-pin" />
      <div style="position:relative">
        <input id="mapLocAddr" type="text" placeholder="Address…" autocomplete="off" />
        <div class="loc-suggestions" id="mapLocAddrSuggestions" style="display:none"></div>
      </div>
      <input id="mapLocName" type="text" placeholder="Display name…" />
      <button onclick="addMapLocation()">Add</button>
    </div>
  </div>
  <div id="mapContainer"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" style="position:relative">
    <div class="modal-title" id="modalTitle">Add event</div>
    <button class="modal-close" id="modalClose"><i data-lucide="x"></i></button>

    <div class="field">
      <label>Type</label>
      <div class="type-picker">
        <div class="type-option selected" data-type="activity">
          <span class="type-icon-lbl"><i data-lucide="map-pin"></i></span>Activity
        </div>
        <div class="type-option" data-type="deadline">
          <span class="type-icon-lbl"><i data-lucide="clock"></i></span>Deadline
        </div>
        <div class="type-option" data-type="travel">
          <span class="type-icon-lbl"><i data-lucide="navigation"></i></span>Travel
        </div>
      </div>
    </div>

    <!-- Vehicle picker — shown only for travel -->
    <div class="field" id="vehicleField" style="display:none">
      <label>Vehicle</label>
      <div class="vehicle-picker">
        <div class="vehicle-opt selected" data-vehicle="car"><i data-lucide="car"></i>Drive</div>
        <div class="vehicle-opt" data-vehicle="plane"><i data-lucide="plane"></i>Plane</div>
      </div>
    </div>

    <!-- Custom icon — shown for activity & deadline -->
    <div class="field" id="iconField">
      <label>Icon</label>
      <div class="icon-picker">
        <div class="icon-quick selected" data-icon="map-pin"><i data-lucide="map-pin"></i></div>
        <div class="icon-quick" data-icon="utensils"><i data-lucide="utensils"></i></div>
        <div class="icon-quick" data-icon="wine"><i data-lucide="wine"></i></div>
        <div class="icon-quick" data-icon="landmark"><i data-lucide="landmark"></i></div>
        <div class="icon-quick" data-icon="mountain"><i data-lucide="mountain"></i></div>
        <div class="icon-quick" data-icon="waves"><i data-lucide="waves"></i></div>
        <div class="icon-quick" data-icon="music"><i data-lucide="music"></i></div>
        <div class="icon-quick" data-icon="bed-double"><i data-lucide="bed-double"></i></div>
        <div class="icon-quick" data-icon="clock"><i data-lucide="clock"></i></div>
        <div class="icon-quick" data-icon="camera"><i data-lucide="camera"></i></div>
        <div class="icon-quick" data-icon="sailboat"><i data-lucide="sailboat"></i></div>
        <div class="icon-quick" data-icon="atv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="17" r="3"/><circle cx="19" cy="17" r="3"/><path d="M5 17h4l2-6h6l2 3"/><path d="M9 11l1-4h5l2 4"/></svg></div>
        <div class="icon-quick" data-icon="alien"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3C7.5 3 4 6.8 4 11.5c0 2.8 1.3 5.3 3.3 6.9L8 20h8l.7-1.6C18.7 16.8 20 14.3 20 11.5 20 6.8 16.5 3 12 3z"/><ellipse cx="9" cy="11" rx="2" ry="2.5" fill="currentColor" stroke="none"/><ellipse cx="15" cy="11" rx="2" ry="2.5" fill="currentColor" stroke="none"/><path d="M10 17.5 Q12 16 14 17.5" stroke-linecap="round"/></svg></div>
        <input class="icon-custom-input" id="fIcon" maxlength="2" placeholder="😀" title="Or type any emoji" />
      </div>
      <div class="icon-custom-hint">Tap an icon above or type any emoji →</div>
    </div>

    <div class="field">
      <label>Accent colour</label>
      <div class="color-picker">
        <div class="color-dot none selected" data-color=""></div>
        <div class="color-dot" data-color="#7ba7d4" style="background:#7ba7d4" title="Steel blue"></div>
        <div class="color-dot" data-color="#6daa82" style="background:#6daa82" title="Sage green"></div>
        <div class="color-dot" data-color="#c4855a" style="background:#c4855a" title="Terracotta"></div>
        <div class="color-dot" data-color="#c47a8a" style="background:#c47a8a" title="Dusty rose"></div>
        <div class="color-dot" data-color="#9b82c4" style="background:#9b82c4" title="Soft purple"></div>
        <div class="color-dot" data-color="#5aadaa" style="background:#5aadaa" title="Teal"></div>
        <div class="color-dot" data-color="#b89a4a" style="background:#b89a4a" title="Mustard"></div>
        <div class="color-dot" data-color="#8a7ac4" style="background:#8a7ac4" title="Indigo"></div>
        <div class="color-dot" data-color="#a07a6a" style="background:#a07a6a" title="Warm brown"></div>
        <div class="color-dot" data-color="#6a9e6a" style="background:#6a9e6a" title="Forest"></div>
        <div class="color-dot" data-color="#c4a05a" style="background:#c4a05a" title="Sand"></div>
      </div>
    </div>

    <div class="field" id="titleField">
      <label>Title</label>
      <input type="text" id="fTitle" placeholder="e.g. Wine tasting" />
    </div>

    <!-- Travel-only from/to -->
    <div class="field-row" id="routeField" style="display:none">
      <div class="field">
        <label>From</label>
        <div style="position:relative">
          <input type="text" id="fFrom" placeholder="e.g. Budapest, Hungary" autocomplete="off" />
          <div class="loc-suggestions" id="locSuggestionsFrom" style="display:none"></div>
        </div>
      </div>
      <div class="field">
        <label>To</label>
        <div style="position:relative">
          <input type="text" id="fTo" placeholder="e.g. Kutaisi, Georgia" autocomplete="off" />
          <div class="loc-suggestions" id="locSuggestionsTo" style="display:none"></div>
        </div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label style="display:flex;align-items:center;gap:10px">Start
          <label style="display:flex;align-items:center;gap:5px;font-weight:400;text-transform:none;letter-spacing:0;font-size:12px;cursor:pointer">
            <input type="checkbox" id="fAllDay" style="width:14px;height:14px;accent-color:var(--accent)"> Unsure about exact time
          </label>
        </label>
        <input type="datetime-local" id="fStart" />
        <input type="date" id="fStartDate" style="display:none" />
      </div>
      <div class="field" id="fEndField">
        <label>End (optional)</label>
        <input type="datetime-local" id="fEnd" />
      </div>
      <div class="field" id="fDurationField" style="display:none">
        <label>Duration</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" id="fDurH" min="0" max="30" placeholder="h" style="width:60px;text-align:center">
          <span style="color:var(--muted);font-size:13px">h</span>
          <input type="number" id="fDurM" min="0" max="59" placeholder="m" style="width:60px;text-align:center">
          <span style="color:var(--muted);font-size:13px">m</span>
        </div>
      </div>
    </div>

    <div class="field" id="locationField">
      <label>Location <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <div style="position:relative">
        <input id="fLocation" type="text" placeholder="e.g. Batumi Old Town, Georgia" autocomplete="off">
        <div class="loc-suggestions" id="locSuggestions" style="display:none"></div>
      </div>
      <input id="fLocationName" type="text" placeholder="Display name (optional)" class="loc-name-input" autocomplete="off">
    </div>

    <div class="field" id="poisField">
      <label>More locations <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <div id="poiList"></div>
      <button type="button" class="add-poi-btn" onclick="addPoi()">+ Add location</button>
    </div>

// Schedule logic

function scheduleContext() {
  const now = new Date();
  const sorted = [...events].sort((a, b) => new Date(a.start_at) - new Date(b.start_at));

  const currentIdx = sorted.findIndex(e => {
    if (e.status === 'done' || e.status === 'skipped') return false;
    if (isAllDay(e)) return false;
    const start = new Date(e.start_at);
    const end   = e.end_at ? new Date(e.end_at) : null;
    if (!end) {
      if (e.type === 'travel' && e.icon !== 'plane') return now >= start;
      return e.status === 'active' || (now >= start && now < start + 3600000);
    }
    return now >= start && now <= end;
  });

  if (currentIdx !== -1) {
    return {
      previous: currentIdx > 0 ? sorted[currentIdx - 1] : null,
      current:  sorted[currentIdx],
      next:     sorted[currentIdx + 1] || null,
    };
  }

  // No active event — find next upcoming
  const nextIdx = sorted.findIndex(e =>
    e.status !== 'done' && e.status !== 'skipped' && new Date(e.start_at) > now
  );

  if (nextIdx !== -1) {
    return {
      previous: nextIdx > 0 ? sorted[nextIdx - 1] : null,
      current:  null,
      next:     sorted[nextIdx],
    };
  }

  return { previous: sorted[sorted.length - 1] || null, current: null, next: null };
}

function progress(ev) {
  if (isAllDay(ev)) return null;
  const now   = new Date();
  const start = new Date(ev.start_at);
  const end   = ev.end_at ? new Date(ev.end_at) : null;
  if (!end) {
    // Non-plane travel cards use distance progress — return 0 so the bar renders
    if (ev.type === 'travel' && ev.icon !== 'plane') return 0;
    return null;
  }
  const total   = end - start;
  const elapsed = now - start;
  return Math.max(0, Math.min(1, elapsed / total));
}

function parseLoc(item) {

function isAllDay(ev) {
  if (!ev?.start_at) return false;
  const d = new Date(ev.start_at);
  return d.getUTCHours() === 0 && d.getUTCMinutes() === 0 && d.getUTCSeconds() === 0 && d.getUTCMilliseconds() === 0;
}

function formatTime(iso) {

}

function formatTimeLeft(ms) {
  if (ms <= 0) return 'overtime';
  if (ms > 36 * 3600000) {
    const days = Math.ceil(ms / 86400000);
    return `${days}d left`;
  }
  const totalMin = Math.ceil(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return `${m}m left`;
  if (m === 0) return `${h}h left`;
  return `${h}h ${m}m left`;
}

function formatDay(iso) {

    if (!targetId || targetId === dragSrcId) return;

    const tgtIdx = notes.findIndex(n => n.id == targetId);
    if (srcIdx === -1 || tgtIdx === -1) return;
    const [moved] = notes.splice(srcIdx, 1);
    notes.splice(tgtIdx, 0, moved);
    renderPinned(); lucide.createIcons();
    if (!DEMO_MODE) {
      const base = new Date('2000-01-01').getTime();
      await Promise.all(notes.map((n, i) =>
        sb.from('events').update({ start_at: new Date(base + i * 1000).toISOString() }).eq('id', n.id)
      ));
    }
  }

  function clearHighlight() {
    rows.forEach(r => r.classList.remove('drag-over'));
  }

  function rowAtY(y) {
    return rows.find(r => {
      const rect = r.getBoundingClientRect();
      return y >= rect.top && y <= rect.bottom;
    });
  }

  rows.forEach(row => {
    // ── Mouse drag ──
    row.addEventListener('mousedown', e => {
      if (e.target.closest('button')) return;
      dragSrcId = row.dataset.noteId;
      row.style.opacity = '.4';

      function onMouseMove(e) {
        const target = rowAtY(e.clientY);
        clearHighlight();
        if (target && target !== row) target.classList.add('drag-over');
      }
      async function onMouseUp(e) {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        row.style.opacity = '';
        clearHighlight();
        const target = rowAtY(e.clientY);
        await applyReorder(target?.dataset.noteId);
      }
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    // ── Touch drag ──
    row.addEventListener('touchstart', e => {
      if (e.target.closest('button')) return;
      dragSrcId = row.dataset.noteId;
      row.style.opacity = '.4';
    }, { passive: true });

    row.addEventListener('touchmove', e => {
      e.preventDefault();
      const touch = e.touches[0];
      const target = rowAtY(touch.clientY);
      clearHighlight();
      if (target && target !== row) target.classList.add('drag-over');
    }, { passive: false });

    row.addEventListener('touchend', async e => {
      const touch = e.changedTouches[0];
      row.style.opacity = '';
      clearHighlight();
      const target = rowAtY(touch.clientY);
      await applyReorder(target?.dataset.noteId);
    });
  });
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
    a.getMonth() === b.getMonth() &&
    a.getDate() === b.getDate();
}

function groupByDay(evList) {
  const groups = {};
  for (const ev of [...evList].sort((a, b) => {
    const aAllDay = isAllDay(a) ? 1 : 0;
    const bAllDay = isAllDay(b) ? 1 : 0;
    if (aAllDay !== bAllDay) return aAllDay - bAllDay;
    return new Date(a.start_at) - new Date(b.start_at);
  })) {
    const day = formatDay(ev.start_at);
    if (!groups[day]) groups[day] = [];
    groups[day].push(ev);
  }
  return groups;
}

function dayBandHtml(day, dayEvents, collapsed, dayIdx) {
  const stored = isDayCollapsed(day);
  if (stored !== null) collapsed = stored;
  const bandClass = `day-band-${Math.min(dayIdx, 3)}`;
  const collClass = collapsed ? ' collapsed' : '';
  let html = `<div class="${bandClass}">`;
  html += `<div class="day-header collapsible${collClass}" data-day="${day}" onclick="toggleDay(this)">
    ${day}
    <span class="day-chevron"><i data-lucide="chevron-down"></i></span>
  </div>`;
  html += `<div class="day-cards${collClass}">`;
  for (const ev of dayEvents) {
    const isDone = ev.status === 'done' || ev.status === 'skipped';
    const isPast = !isDone && new Date(ev.end_at || ev.start_at) < new Date();
    const isUpcoming = !isDone && !isPast && new Date(ev.start_at) > new Date();
    html += eventCardHtml(ev, isDone || isPast ? 'done' : '', false, isUpcoming);
  }
  html += `</div></div>`;
  return html;
}

// Past DAYS (not today) — collapsed above everything
function renderPastDays() {
  const el  = document.getElementById('pastSection');
  const now = new Date();
  const groups = groupByDay(events);
  const pastGroups = Object.entries(groups).filter(([, evs]) =>
    evs.every(ev => new Date(ev.end_at || ev.start_at) < now) &&
    !sameDay(new Date(evs[0].start_at), now)
  );
  if (!pastGroups.length) { el.innerHTML = ''; return; }
  let html = '';
  pastGroups.forEach(([day, evs], i) => { html += dayBandHtml(day, evs, true, i); });
  el.innerHTML = html;
  bindCardActions(el);
}

// Today's day header + already-finished events above NOW
function renderTodayPast() {
  const el  = document.getElementById('todayPastSection');
  const now = new Date();
  const ctx = scheduleContext();
  const currentId = ctx.current?.id;

  // Find all today's events to decide whether to show header at all
  const todayAll = events.filter(ev => sameDay(new Date(ev.start_at), now));
  if (!todayAll.length) { el.innerHTML = ''; return; }

  const todayPast = todayAll
    .filter(ev => new Date(ev.end_at || ev.start_at) < now && ev.id !== currentId)
    .sort((a, b) => new Date(a.start_at) - new Date(b.start_at));

  // Day band index: count how many past-day groups precede today
  const groups = groupByDay(events);
  const pastDayCount = Object.values(groups).filter(evs =>
    evs.every(ev => new Date(ev.end_at || ev.start_at) < now) &&
    !sameDay(new Date(evs[0].start_at), now)
  ).length;
  const bandClass = `day-band-${Math.min(pastDayCount, 3)}`;

  let html = `<div class="${bandClass}">`;
  html += `<div class="day-header">${formatDay(now.toISOString())}</div>`;
  for (const ev of todayPast) html += eventCardHtml(ev, 'done', false, false);
  html += `</div>`;

  el.innerHTML = html;
  bindCardActions(el);
}

// NOW + all remaining today's events under UP NEXT
function renderCurrent() {
  const el  = document.getElementById('currentSection');
  const ctx = scheduleContext();
  const now = new Date();

  if (!ctx.current && !ctx.next) { el.innerHTML = ''; return; }

  let html = '';

  if (ctx.current) {
    html += `<div class="section-label">Now</div>`;
    html += eventCardHtml(ctx.current, 'current', true);
  }

  // All upcoming events for today after current
  const currentId = ctx.current?.id;
  const todayUpcoming = events
    .filter(ev => sameDay(new Date(ev.start_at), now) &&
      ev.id !== currentId &&
      ev.status !== 'done' && ev.status !== 'skipped' &&
      new Date(ev.start_at) >= now)
    .sort((a, b) => new Date(a.start_at) - new Date(b.start_at));

  const upNextList = todayUpcoming;

  if (upNextList.length) {
    html += `<div class="section-label">Up next</div>`;
    for (const ev of upNextList) html += eventCardHtml(ev, '', false, true);
  }

  el.innerHTML = html;
  bindCardActions(el);
}

// Future days only (not today) — expanded by default
function renderSchedule() {
  const el  = document.getElementById('scheduleSection');
  const now = new Date();

  if (!events.length) {
    el.innerHTML = isAdmin ? '' : `<div class="empty"><div class="empty-icon">🗺️</div><p>No events yet.</p></div>`;
    return;
  }

  const groups = groupByDay(events);
  const futureDayGroups = Object.entries(groups).filter(([, evs]) =>
    !sameDay(new Date(evs[0].start_at), now) &&
    !evs.every(ev => new Date(ev.end_at || ev.start_at) < now)
  );

  if (!futureDayGroups.length) { el.innerHTML = ''; return; }

  let html = '';
  futureDayGroups.forEach(([day, evs], i) => { html += dayBandHtml(day, evs, false, i); });

  el.innerHTML = html;
  bindCardActions(el);
}

function travelRouteHtml(ev) {
  const parts = ev.title.split(/\s*->\s*/);
  if (parts.length < 2) return '';
  const icon = eventIcon(ev);
  const arrowIcon = isLucide(icon)
    ? `·· ${iconHtml(icon)} ··`
    : `··${icon}··`;
  return `<div class="travel-route">
    <span class="travel-city">${escHtml(parts[0])}</span>
    <span class="travel-arrow">${arrowIcon}</span>
    <span class="travel-city">${escHtml(parts.slice(1).join(' → '))}</span>
  </div>`;
}

function eventCardHtml(ev, extraClass = '', showProgress = false, showStartsIn = false) {
  const allDay = isAllDay(ev);
  const p   = progress(ev);
  const isPlane = ev.type === 'travel' && ev.icon === 'plane';
  const planeDuration = isPlane && ev.end_at ? (() => {
    const mins = Math.round((new Date(ev.end_at) - new Date(ev.start_at)) / 60000);
    const h = Math.floor(mins / 60), m = mins % 60;
    return m ? `${h}h ${m}m` : `${h}h`;
  })() : '';
  const end = (!allDay && ev.end_at && !isPlane) ? ` – ${formatTime(ev.end_at)}` : (planeDuration ? ` · ${planeDuration}` : '');
  const timeDisplay = allDay ? `<span class="card-time" style="letter-spacing:0.02em">?</span>` : `<span class="card-time">${formatTime(ev.start_at)}${end}</span>`;
  const isLate = !allDay && new Date() > new Date(ev.end_at || ev.start_at) && ev.status !== 'done';
  const startsInMs = new Date(ev.start_at) - new Date();
  const startsInLabel = showStartsIn && startsInMs > 0 ? `<span class="starts-in">in ${formatTimeLeft(startsInMs).replace(' left','')}</span>` : '';
  const typeClass2 = ev.type === 'travel' ? ' type-travel' : ev.type === 'deadline' ? ' type-deadline' : '';

  const useDistProgress = showProgress && ev.type === 'travel' && !isPlane;

  let progressHtml = '';
  if (useDistProgress) {
    if (!travelDistCache[ev.id]) initTravelDist(ev);
    const cache = travelDistCache[ev.id];
    const dist = (cache && cache !== 'loading' && cache !== 'error') ? cache : null;
    let barPct = 0, centerLabel;
    if (dist) {
      if (locationEnabled && currentPosition) {
        const remKm = haversineKm(currentPosition.lat, currentPosition.lng, dist.toCoords.lat, dist.toCoords.lng);
        barPct = Math.round(Math.max(0, Math.min(1, (dist.totalKm - remKm) / dist.totalKm)) * 100);
        centerLabel = formatKm(remKm) + ' left';
      } else if (locationEnabled && geoError) {
        centerLabel = `<span style="color:var(--red);font-size:10px;white-space:normal;display:block;text-align:center">${geoError}</span>`;
      } else if (locationEnabled) {
        centerLabel = 'Getting location…';
      } else {
        centerLabel = formatKm(dist.totalKm);
      }
    } else {
      centerLabel = '…';
    }
    progressHtml = `
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" style="width:${barPct}%"></div>
        </div>
        <div class="progress-labels">
          <span>${formatTime(ev.start_at)}</span>
          <span>${centerLabel}</span>
          <span>${ev.end_at ? formatTime(ev.end_at) : ''}</span>
        </div>
      </div>`;
  } else if (p !== null && !allDay && extraClass !== 'done' && new Date() >= new Date(ev.start_at)) {
    const timeLeftLabel = isLate ? 'overtime' : formatTimeLeft(new Date(ev.end_at) - new Date());
    progressHtml = `
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill ${isLate ? 'late' : ''}" style="width:${Math.round(p * 100)}%"></div>
        </div>
        <div class="progress-labels">
          <span>${formatTime(ev.start_at)}</span>
          <span>${timeLeftLabel}</span>
          <span>${isPlane ? planeDuration : formatTime(ev.end_at)}</span>
        </div>
      </div>`;
  }

  let notesHtml = '';
  if (ev.notes) {
    notesHtml = `
      <div class="card-notes">${escHtml(ev.notes)}</div>`;
  }

  function locationRowHtml(locStr, lookupKey, displayName = '') {
    locationLookup[lookupKey] = locStr;
    const label = displayName || locStr.split(',')[0].trim();
    let distHtml = '';
    if (locationEnabled && currentPosition && geocodeCache[locStr]) {
      const c = geocodeCache[locStr];
      const km = haversineKm(currentPosition.lat, currentPosition.lng, c.lat, c.lng);
      distHtml = `<span class="loc-distance">${formatKm(km)}</span>`;
    }
    return `<div class="card-location-row">
      <a class="card-location" href="#" onclick="flyToAddress(decodeURIComponent('${encodeURIComponent(locStr)}'));return false;"><i data-lucide="map-pin"></i>${escHtml(label)}</a>
      ${distHtml}
    </div>`;
  }

  let locationHtml = '';
  const locRows = [];
  if (ev.location) locRows.push(locationRowHtml(ev.location, ev.id, ev.location_name || ''));
  (ev.locations || []).forEach((loc, i) => {
    const { address, name } = parseLoc(loc);
    if (address) locRows.push(locationRowHtml(address, `${ev.id}_poi_${i}`, name));
  });
  locationHtml = locRows.join('');

  const adminHtml = `
    <div class="card-actions">
      <button class="action-btn edit" onclick="openEdit('${ev.id}')"><i data-lucide="pencil"></i>Edit</button>
      <button class="action-btn success" onclick="markDone('${ev.id}')"><i data-lucide="check"></i>Done</button>
      <button class="action-btn advance" onclick="skipAdvance('${ev.id}')"><i data-lucide="skip-forward"></i>Skip</button>
      <button class="action-btn danger" onclick="removeEvent('${ev.id}')"><i data-lucide="x"></i>Remove</button>
    </div>`;

  const colorStyle = ev.color ? ` style="--card-color:${ev.color}"` : '';
  const colorClass = ev.color ? ' has-color' : '';
  const isTravel = ev.type === 'travel';
  const routeHtml = isTravel ? travelRouteHtml(ev) : '';

  if (isTravel && routeHtml) {
    return `
    <div class="card ${extraClass}${colorClass}${typeClass2}"${colorStyle} data-id="${ev.id}">
      ${routeHtml}
      ${p !== null && !allDay && extraClass !== 'done' && new Date() >= new Date(ev.start_at) ? '' : `<div class="card-meta" style="margin-top:6px">
        ${timeDisplay}
        ${badgeHtml(ev)}${startsInLabel}
      </div>`}
      ${progressHtml}
      ${locationHtml}
      ${notesHtml}
      ${adminHtml}
    </div>`;
  }

  return `
    <div class="card ${extraClass}${colorClass}${typeClass2}"${colorStyle} data-id="${ev.id}">
      <div class="card-header">
        <div class="card-icon ${typeClass(ev.type)}">${iconHtml(eventIcon(ev))}</div>
        <div class="card-body">
          <div class="card-title">${escHtml(ev.title)}</div>
          ${p !== null && !allDay && extraClass !== 'done' && new Date() >= new Date(ev.start_at) ? '' : `<div class="card-meta">
            ${timeDisplay}
            ${badgeHtml(ev)}${startsInLabel}
          </div>`}
        </div>
      </div>
      ${progressHtml}
      ${locationHtml}
      ${notesHtml}
      ${adminHtml}
    </div>`;
}

function attachLocAutocomplete(inputId, boxId) {
  attachLocAutocompleteEl(document.getElementById(inputId), document.getElementById(boxId));
}

function attachLocAutocompleteEl(input, box) {
  let timer, activeIdx = -1, results = [];

  async function search(q) {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`;
    try {
      const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      results = await res.json();
    } catch { results = []; }
    activeIdx = -1;
    renderList();
  }

  function displayName(r) {
    const a = r.address || {};
    const primary = a.amenity || a.tourism || a.leisure || a.shop || a.historic || r.name || r.display_name.split(',')[0];
    const secondary = [a.city || a.town || a.village, a.country].filter(Boolean).join(', ');
    return { primary, secondary };
  }

  function renderList() {
    if (!results.length) { box.style.display = 'none'; return; }
    box.innerHTML = results.map((r, i) => {
      const { primary, secondary } = displayName(r);
      return `<div class="loc-suggestion${i === activeIdx ? ' active' : ''}" data-idx="${i}">
        ${primary}<small>${secondary}</small>
      </div>`;
    }).join('');
    box.style.display = 'block';
  }

  function select(r) {
    const { primary, secondary } = displayName(r);
    input.value = [primary, secondary].filter(Boolean).join(', ');
    results = []; box.style.display = 'none';
    geocodeCache[input.value] = { lat: parseFloat(r.lat), lng: parseFloat(r.lon) };
    try { localStorage.setItem('geocodeCache', JSON.stringify(geocodeCache)); } catch {}
  }

  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 3) { results = []; box.style.display = 'none'; return; }
    timer = setTimeout(() => search(q), 350);
  });

  input.addEventListener('keydown', e => {
    if (!results.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, results.length - 1); renderList(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); renderList(); }
    else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); select(results[activeIdx]); }
    else if (e.key === 'Escape') { results = []; box.style.display = 'none'; }
  });

  box.addEventListener('mousedown', e => {
    const el = e.target.closest('.loc-suggestion');
    if (el) { e.preventDefault(); select(results[+el.dataset.idx]); }
  });

  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !box.contains(e.target)) { results = []; box.style.display = 'none'; }
  });
}

function addPoi(address = '', name = '') {
  const row = document.createElement('div');

  const wrap = document.createElement('div');

  const input = document.createElement('input');

  const removeBtn = document.createElement('button');
  removeBtn.type = 'button';

function toLocalInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function fromLocalInput(val) {
  if (!val) return null;
  return new Date(val).toISOString();
}

function populateForm(ev) {
  selectedType = ev.type || 'activity';
  document.querySelectorAll('.type-option').forEach(o => {
    o.classList.toggle('selected', o.dataset.type === selectedType);
  });
  updateFormForType();

  if (selectedType === 'travel') {
    setSelectedVehicle(ev.icon);
  } else {
    setSelectedIcon(ev.icon || (selectedType === 'deadline' ? 'clock' : 'map-pin'));
  }
  setSelectedColor(ev.color);

  if (selectedType === 'travel') {
    const parts = (ev.title || '').split(/\s*->\s*/);
    document.getElementById('fFrom').value = parts[0] || '';
    document.getElementById('fTo').value   = parts[1] || '';
    document.getElementById('fTitle').value = '';
  } else {
    document.getElementById('fTitle').value = ev.title || '';
    document.getElementById('fFrom').value  = '';
    document.getElementById('fTo').value    = '';
  }
  const allDayEv = isAllDay(ev);
  document.getElementById('fAllDay').checked = allDayEv;
  if (allDayEv) {
    document.getElementById('fStart').style.display = 'none';
    document.getElementById('fStartDate').style.display = '';
    document.getElementById('fEndField').style.display = 'none';
    const d = new Date(ev.start_at);
    const yyyy = d.getUTCFullYear();
    const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(d.getUTCDate()).padStart(2, '0');
    document.getElementById('fStartDate').value = `${yyyy}-${mm}-${dd}`;
    document.getElementById('fEnd').value = '';
  } else {
    document.getElementById('fStart').style.display = '';
    document.getElementById('fStartDate').style.display = 'none';
    document.getElementById('fStart').value = toLocalInput(ev.start_at);
    if (ev.icon === 'plane' && ev.end_at && ev.start_at) {
      const mins = Math.round((new Date(ev.end_at) - new Date(ev.start_at)) / 60000);
      document.getElementById('fDurH').value = Math.floor(mins / 60);
      document.getElementById('fDurM').value = mins % 60;
      document.getElementById('fEnd').value  = '';
    } else {
      document.getElementById('fEnd').value  = toLocalInput(ev.end_at);
      document.getElementById('fDurH').value = '';
      document.getElementById('fDurM').value = '';
    }
  }
  document.getElementById('fNotes').value        = ev.notes         || '';
  document.getElementById('fLocation').value     = ev.location      || '';
  document.getElementById('fLocationName').value = ev.location_name || '';
  document.getElementById('poiList').innerHTML = '';
  (ev.locations || []).forEach(loc => {
    const { address, name } = parseLoc(loc);
    addPoi(address, name);
  });
}

document.getElementById('saveBtn').addEventListener('click', async () => {
  const isTravel = selectedType === 'travel';
  const from  = document.getElementById('fFrom').value.trim();
  const to    = document.getElementById('fTo').value.trim();
  const title = isTravel
    ? (from && to ? `${from} -> ${to}` : from || to || '')
    : document.getElementById('fTitle').value.trim();
  const allDay = document.getElementById('fAllDay').checked;
  const start = allDay ? document.getElementById('fStartDate').value : document.getElementById('fStart').value;
  if (!title || !start) { alert((isTravel ? 'From/To' : 'Title') + ' and start ' + (allDay ? 'date' : 'time') + ' are required.'); return; }

  let startAt;
  if (allDay) {
    startAt = start + 'T00:00:00.000Z';
  } else {
    startAt = fromLocalInput(start);
  }

  const resolvedIcon = selectedType === 'travel' ? selectedVehicle : selectedIcon;

  const ev = {
    id:       editingId || undefined,
    type:     selectedType,
    title,
    icon:     resolvedIcon || null,
    color:    selectedColor || null,
    start_at: startAt,
    end_at:   (() => {
      if (allDay) return null;
      if (selectedVehicle === 'plane') {
        const h = parseInt(document.getElementById('fDurH').value) || 0;
        const m = parseInt(document.getElementById('fDurM').value) || 0;
        const durMs = (h * 60 + m) * 60000;
        return durMs > 0 ? new Date(new Date(startAt).getTime() + durMs).toISOString() : null;
      }
      return fromLocalInput(document.getElementById('fEnd').value) || null;
    })(),
    notes:         document.getElementById('fNotes').value.trim() || null,
    location:      document.getElementById('fLocation').value.trim() || null,
    location_name: document.getElementById('fLocationName').value.trim() || null,
    locations: [...document.querySelectorAll('#poiList .poi-row')].map(row => ({
      address: row.querySelector('input:first-of-type').value.trim(),
      name:    row.querySelector('.poi-name-input').value.trim(),
    })).filter(p => p.address),
    status:   editingId ? (events.find(e => e.id === editingId)?.status || 'upcoming') : 'upcoming',
  };

  document.getElementById('saveBtn').disabled = true;
  await saveEvent(ev);
  document.getElementById('saveBtn').disabled = false;
  closeModal();
});

function collectMapPoints() {
  const points = [];
  // Event locations
  for (const ev of events) {
    if (ev.type === 'note') continue;
    const locs = [];
    if (ev.location) locs.push({ address: ev.location, name: ev.location_name || ev.location.split(',')[0].trim(), event: ev.title });
    (ev.locations || []).forEach(l => {
      const { address, name } = parseLoc(l);
      if (address) locs.push({ address, name: name || address.split(',')[0].trim(), event: ev.title });
    });
    for (const loc of locs) {
      const c = geocodeCache[loc.address];
      if (c && c !== false) {
        const dist = currentPosition ? haversineKm(currentPosition.lat, currentPosition.lng, c.lat, c.lng) : null;
        points.push({ lat: c.lat, lng: c.lng, label: loc.name, sub: loc.event, type: 'event', dist, icon: ev.icon || 'map-pin', addr: loc.address });
      }
    }
  }
  // Pinned addresses
  for (const n of notes) {
    if (!isLocNote(n)) continue;
    const c = geocodeCache[n.title];
    if (c && c !== false) {
      const dist = currentPosition ? haversineKm(currentPosition.lat, currentPosition.lng, c.lat, c.lng) : null;
      points.push({ lat: c.lat, lng: c.lng, label: n.notes || n.title.split(',')[0].trim(), sub: null, type: 'pin', dist, icon: n.icon || 'map-pin', addr: n.title });
    }
  }
  return points;
}

window.toggleMap = async (forceOpen = false) => {
  const overlay = document.getElementById('mapOverlay');
  const header = document.getElementById('appHeader');
  // Measure and set header height so map overlay starts below it
  if (header) {
    const h = header.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--header-h', h + 'px');
  }
  // If forcing open and already open, skip re-init entirely
  if (forceOpen && overlay.classList.contains('open')) return;
  const isOpen = forceOpen ? (overlay.classList.add('open'), true) : overlay.classList.toggle('open');
  header?.classList.toggle('map-open', isOpen);
  document.getElementById('mapBtn')?.classList.toggle('active', isOpen);
  const mapBtnIcon = document.getElementById('mapBtnIcon');
  if (mapBtnIcon) { mapBtnIcon.setAttribute('data-lucide', isOpen ? 'x' : 'map'); lucide.createIcons({ nodes: [mapBtnIcon.parentElement] }); }
  const mapControls = document.getElementById('mapControls');
  if (isOpen) {
    mapControls.classList.remove('closing');
    mapControls.style.display = '';
  } else {
    mapControls.classList.add('closing');
    setTimeout(() => {
      if (mapControls.classList.contains('closing')) {
        mapControls.style.display = 'none';
        mapControls.classList.remove('closing');
      }
    }, 400);
  }
  if (isOpen) { updateMapZoomButtons(); }
  if (!isOpen) {
    localStorage.removeItem('mapOpen');
    if (mapInstance) {
      const c = mapInstance.getCenter();
      try { localStorage.setItem('mapView', JSON.stringify({ lng: c.lng, lat: c.lat, zoom: mapInstance.getZoom() })); } catch {}
    }
    if (mapRealtimeSub) { mapRealtimeSub.unsubscribe(); mapRealtimeSub = null; }
    if (locationEnabled) startGeoWatch(300000);
    return;
  }
  localStorage.setItem('mapOpen', '1');
  mapFirstOpen = true;
  const hasSavedView = !!localStorage.getItem('mapView');
  mapFlyOnNextFix = !hasSavedView;
  if (locationEnabled) startGeoWatch(15000);
  lucide.createIcons({ nodes: [overlay] });
  await fetchUserLocations();
  if (!mapInstance) {
    initMap();
  } else {
    if (!forceOpen) {
      const saved = (() => { try { return JSON.parse(localStorage.getItem('mapView')); } catch { return null; } })();
      if (saved) mapInstance.jumpTo({ center: [saved.lng, saved.lat], zoom: saved.zoom });
    }
    refreshMapMarkers();
  }
  // Realtime subscription for user locations
  if (!DEMO_MODE && !mapRealtimeSub) {
    mapRealtimeSub = sb.channel('user_locations')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'user_locations' }, async () => {
        await fetchUserLocations();
        refreshMapMarkers();
      })
      .subscribe();
  }
};

function initMap() {
  if (MAPTILER_KEY === 'YOUR_MAPTILER_KEY') {
    document.getElementById('mapContainer').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px;text-align:center;padding:32px">Set <code style="color:var(--accent)">MAPTILER_KEY</code> in index.html to enable the map.<br><small style="opacity:.6;margin-top:8px;display:block">Free key at maptiler.com</small></div>';
    return;
  }
  mapInstance = new maplibregl.Map({
    container: 'mapContainer',
    style: amberMapStyle(),
    center: (() => { try { const v = JSON.parse(localStorage.getItem('mapView')); return v ? [v.lng, v.lat] : [44.8015, 41.6938]; } catch { return [44.8015, 41.6938]; } })(),
    zoom: (() => { try { const v = JSON.parse(localStorage.getItem('mapView')); return v ? v.zoom : 6; } catch { return 6; } })(),
    attributionControl: false,
  });
  mapInstance.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-left');
  mapInstance.on('load', () => { refreshMapMarkers(!localStorage.getItem('mapView')); updateMarkerStyle(); });
  mapInstance.on('move', () => { if (mapInstance.getZoom() >= 13) lastCityCenter = mapInstance.getCenter().toArray(); });
  mapInstance.on('zoom', () => { updateLocChipVisibility(); updateMapZoomButtons(); updateMarkerStyle(); });
  mapInstance.on('click', () => {
    document.querySelectorAll('.map-gm-btn').forEach(b => { b.style.display = 'none'; });
    const panel = document.getElementById('mapLocationsPanel');
    if (panel?.classList.contains('open')) toggleMapLocations();
  });
}

const USER_COLORS = ['#34c759','#64d2ff','#bf5af2','#ff6b6b','#30d158','#0a84ff'];
function userColor(id) {
  if (id === DEVICE_ID) return '#ff9f0a';
  const others = userLocations.filter(u => u.id !== DEVICE_ID).map(u => u.id);
  const idx = others.indexOf(id);
  return USER_COLORS[idx % USER_COLORS.length];
}

async function fetchUserLocations() {
  if (DEMO_MODE) return;
  const { data } = await sb.from('user_locations').select('*');
  if (data) userLocations = data;
}

async function pushUserLocation(lat, lng) {
  if (DEMO_MODE || !userName) return;
  await sb.from('user_locations').upsert({
    id: DEVICE_ID, name: userName, lat, lng,
    updated_at: new Date().toISOString(),
  });
  if (mapInstance && document.getElementById('mapOverlay')?.classList.contains('open')) {
    await fetchUserLocations();
    refreshMapMarkers();
  }

function timeAgo(iso) {
  const s = Math.round((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}
