function updateLocChipVisibility() {
  const visible = mapInstance && mapInstance.getZoom() >= 13;
  for (const el of locChipMarkers) el.style.display = visible ? 'flex' : 'none';
}

function updateMapZoomButtons() {
  if (!mapInstance) return;
  const z = mapInstance.getZoom();
  // midpoints: street(17) vs neighbourhood(13) → 15; neighbourhood(13) vs overview → 11
  const isStreet = z >= 15;
  const isNeighbourhood = z >= 11 && z < 15;
  const isOverview = z < 11;
  document.getElementById('mapNavBtn')?.classList.toggle('active', isStreet);
  document.getElementById('mapLandmarkBtn')?.classList.toggle('active', isNeighbourhood);
  document.getElementById('mapGlobeBtn')?.classList.toggle('active', isOverview);
}

function addMarker(lngLat, icon, label, distText, popupHtml, bounds, addr) {
  const color = locColor(icon);
  // Icon circle marker
  const el = document.createElement('div');
  el.className = 'map-marker-icon';
  el.style.setProperty('--mc', color);
  el.innerHTML = iconHtml(icon || 'map-pin');
  const popup = new maplibregl.Popup({ offset: 20, closeButton: false, closeOnClick: false })
    .setHTML(popupHtml);
  el.addEventListener('mouseenter', () => popup.addTo(mapInstance));
  el.addEventListener('mouseleave', () => popup.remove());
  const marker = new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat(lngLat).addTo(mapInstance);
  mapMarkers.push(marker);
  bounds.extend(lngLat);

  // Chip label marker
  const chipText = distText ? `${label} · ${distText}` : label;
  const chipWrap = document.createElement('div');
  chipWrap.style.cssText = `display:none;flex-direction:column;align-items:center;gap:4px;pointer-events:auto`;
  const chip = document.createElement('div');
  chip.style.cssText = `white-space:nowrap;background:var(--surface2);color:var(--accent);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid rgba(255,159,10,.3);cursor:pointer;user-select:none`;
  chip.textContent = chipText;
  const gmBtn = document.createElement('a');
  gmBtn.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr || label)}`;
  gmBtn.target = '_blank';
  gmBtn.rel = 'noopener';
  gmBtn.style.cssText = `display:none;align-items:center;gap:4px;background:var(--surface2);color:var(--accent);font-size:11px;font-weight:600;padding:3px 8px 3px 5px;border-radius:20px;border:1px solid rgba(255,159,10,.3);text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.4);white-space:nowrap`;
  gmBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#ff9f0a"/><circle cx="12" cy="9" r="2.5" fill="var(--surface2)"/></svg>Open in Maps`;
  chip.addEventListener('click', (e) => {
    e.stopPropagation();
    const showing = gmBtn.style.display === 'flex';
    document.querySelectorAll('.map-gm-btn').forEach(b => { b.style.display = 'none'; });
    // reset z-index on all chip marker wrappers
    locChipMarkers.forEach(w => { if (w.parentElement) w.parentElement.style.zIndex = ''; });
    gmBtn.style.display = showing ? 'none' : 'flex';
    if (!showing) chipWrap.parentElement && (chipWrap.parentElement.style.zIndex = '9999');
  });
  gmBtn.className = 'map-gm-btn';
  chipWrap.appendChild(chip);
  chipWrap.appendChild(gmBtn);
  locChipMarkers.push(chipWrap);
  const chipMarker = new maplibregl.Marker({ element: chipWrap, anchor: 'bottom', offset: [0, -20] })
    .setLngLat(lngLat).addTo(mapInstance);
  mapMarkers.push(chipMarker);
}

function refreshMapMarkers(adjustViewport = false) {
  if (!mapInstance) return;
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];
  locChipMarkers = [];

  const bounds = new maplibregl.LngLatBounds();
  let count = 0;

  // Event & pinned locations
  const pts = collectMapPoints();
  for (const pt of pts) {
    const distText = (currentPosition && pt.dist != null) ? formatKm(pt.dist) : '';
    addMarker(
      [pt.lng, pt.lat],
      pt.icon || 'map-pin',
      pt.label,
      distText,
      `<strong style="color:var(--accent)">${escHtml(pt.label)}</strong>${pt.sub ? `<br><span style="color:var(--muted);font-size:11px">${escHtml(pt.sub)}</span>` : ''}`,
      bounds,
      pt.addr
    );
    count++;
  }
  updateLocChipVisibility();

  // Build list of user entries to render; ensure self is always included if position is known
  const selfInDb = userLocations.find(u => u.id === DEVICE_ID);
  const presenceList = [...userLocations];
  if (!selfInDb && currentPosition && userName) {
    presenceList.push({ id: DEVICE_ID, name: userName, lat: currentPosition.lat, lng: currentPosition.lng, updated_at: new Date().toISOString() });
  }

  for (const u of presenceList) {
    const isSelf = u.id === DEVICE_ID;
    const staleMs = Date.now() - new Date(u.updated_at).getTime();
    if (!isSelf && staleMs > 60 * 60 * 1000) continue;
    const isStale = !isSelf && staleMs > 10 * 60 * 1000;
    const displayColor = isStale ? '#888' : '#ff9f0a';

    const el = document.createElement('div');
    el.style.cssText = `position:relative;width:32px;height:32px;cursor:pointer`;

    if (isSelf) {
      const pulse = document.createElement('div');
      pulse.style.cssText = `position:absolute;inset:-6px;border-radius:50%;border:2px solid ${displayColor};opacity:.5;animation:map-pulse 2s ease-out infinite`;
      el.appendChild(pulse);
    }

    const avatar = document.createElement('div');
    avatar.style.cssText = `width:32px;height:32px;border-radius:50%;background:rgba(255,159,10,.13);border:2px solid ${displayColor};display:flex;align-items:center;justify-content:center;color:${displayColor};box-shadow:0 0 12px rgba(255,159,10,.33)`;
    avatar.innerHTML = PERSON_SVG;
    el.appendChild(avatar);

    const nameChip = document.createElement('div');
    const chipLabel = isStale
      ? `${u.name} · ${timeAgo(u.updated_at)}`
      : u.name + (isSelf ? ' ·you' : '');
    nameChip.style.cssText = `position:absolute;bottom:38px;left:50%;transform:translateX(-50%);white-space:nowrap;background:var(--surface2);color:${displayColor};font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid rgba(255,159,10,.27);pointer-events:none`;
    nameChip.textContent = chipLabel;
    el.appendChild(nameChip);

    const popup = new maplibregl.Popup({ offset: 22, closeButton: false, closeOnClick: false })
      .setHTML(`<strong style="color:${displayColor}">${escHtml(u.name)}${isSelf ? ' <span style="opacity:.5">(you)</span>' : ''}</strong><br><span style="color:var(--muted);font-size:11px">${timeAgo(u.updated_at)}</span>`);
    el.addEventListener('mouseenter', () => popup.addTo(mapInstance));
    el.addEventListener('mouseleave', () => popup.remove());

    new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([u.lng, u.lat]).addTo(mapInstance);
    mapMarkers.push({ remove: () => { el.remove(); popup.remove(); } });
    bounds.extend([u.lng, u.lat]);
    count++;
  }

  lucide.createIcons({ nodes: [document.getElementById('mapContainer')] });

  if (!adjustViewport || !count) return;
  if (count === 1) {
    const first = [...collectMapPoints(), ...userLocations.map(u => ({ lng: u.lng, lat: u.lat }))][0];
    mapInstance.flyTo({ center: [first.lng, first.lat], zoom: 13 });
  } else {
    mapInstance.fitBounds(bounds, { padding: 60, maxZoom: 14 });
  }
}

// ─────────────────────────────────────────────
// Live progress tick
// ─────────────────────────────────────────────
function updateCountdown() {
  const el = document.getElementById('countdown');
  if (!el) return;
  const first = window._tripFirst, last = window._tripLast;
  if (!first) return;
  const now = new Date(), diff = first - now;
  let html;
  if (diff > 0) {
    let label;
    if (diff >= 86400000) {
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      label = `${d}d ${h}h`;
    } else {
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      label = `${h}h ${m}m`;
    }
    html = `Starts in <strong>${label}</strong>`;
  } else if (last > now) {
    html = '';
  } else {
    html = 'Trip completed';
  }
  el.innerHTML = html;
}

function startTick() {
  setInterval(() => {
    updateCountdown();
    const ctx = scheduleContext();
    if (!ctx.current) return;

    // Update progress bar without full re-render
    const p = progress(ctx.current);
    if (p === null) return;
    // Non-plane travel cards use distance progress — don't overwrite with time labels
    if (ctx.current.type === 'travel' && ctx.current.icon !== 'plane') return;
    const fill = document.querySelector('#currentSection .progress-fill');
    const pct  = document.querySelector('#currentSection .progress-labels span:nth-child(2)');
    const isLate = new Date() > new Date(ctx.current.end_at || ctx.current.start_at);
    if (fill) fill.style.width = `${Math.round(p * 100)}%`;
    if (pct)  pct.textContent  = isLate ? 'overtime' : formatTimeLeft(new Date(ctx.current.end_at) - new Date());
  }, 10000); // every 10s
}

// Reload data every 30s, but skip if the note input is focused
function startRefresh() {
  refreshTimer = setInterval(() => {
    const input = document.getElementById('noteInput');
    if (input && document.activeElement === input) return;
    loadEvents();
  }, 30000);
}

// ─────────────────────────────────────────────
// Location tracking
// ─────────────────────────────────────────────

let   locationEnabled    = false;
const geocodeCache       = JSON.parse(localStorage.getItem('geocodeCache') || '{}'); // persisted across reloads
const locationLookup     = {};          // card id -> location string (set during render)
const travelDistCache    = {};          // ev id -> { totalKm, fromCoords, toCoords } | 'loading' | 'error'
let   geoWatchId         = null;
let   currentPosition    = null;
let   geoError           = null;   // error message to show on card

// ── User presence ──
const DEVICE_ID = (() => {
  let id = localStorage.getItem('deviceId');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('deviceId', id); }
  return id;
})();
let userName = localStorage.getItem('userName') || null;

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatKm(km) {
  if (km < 1) return `${Math.round(km * 1000)} m`;
  if (km < 10) return `${km.toFixed(1)} km`;
  return `${Math.round(km)} km`;
}

function persistGeocodeToDb(addr, coords) {
  if (DEMO_MODE) return;
  // Shared cache — covers all addresses regardless of source
  sb.from('geocode_cache').upsert({ address: addr, lat: coords.lat, lng: coords.lng });
  // Also write onto the event/note row directly for the primary location field
  const noteMatches = notes.filter(n => n.title === addr && (n.lat == null || n.lng == null));
  for (const n of noteMatches) {
    n.lat = coords.lat; n.lng = coords.lng;
    sb.from('events').update({ lat: coords.lat, lng: coords.lng }).eq('id', n.id);
  }
  const evMatches = events.filter(e => e.location === addr && (e.lat == null || e.lng == null));
  for (const e of evMatches) {
    e.lat = coords.lat; e.lng = coords.lng;
    sb.from('events').update({ lat: coords.lat, lng: coords.lng }).eq('id', e.id);
  }
}

// ── Plus Code (Open Location Code) support ──
function isPlusCode(s) {
  const t = s.trim().toUpperCase();
  const plus = t.indexOf('+');
  if (plus < 2 || plus > 8) return false;
  const codePart = t.slice(0, plus + 3).replace('+', '');
  return [...codePart].every(c => '23456789CFGHJMPQRVWX'.includes(c));
}

async function geocodePlusCode(locationStr) {
  const str = locationStr.trim();
  const plus = str.indexOf('+');
  const codePart = str.slice(0, plus + 3).trim();
  const cityPart = str.slice(plus + 3).trim();
  try {
    let fullCode = codePart;
    if (OLC.isShort(codePart)) {
      if (!cityPart) return null;
      const ref = await geocode(cityPart);
      if (!ref) return null;
      fullCode = OLC.recoverNearest(codePart, ref.lat, ref.lng);
    }
    const area = OLC.decode(fullCode);
    const coords = { lat: area.latitudeCenter, lng: area.longitudeCenter };
    geocodeCache[locationStr] = coords;
    try { localStorage.setItem('geocodeCache', JSON.stringify(geocodeCache)); } catch {}
    persistGeocodeToDb(locationStr, coords);
    return coords;
  } catch { return null; }
}

async function geocode(locationStr) {
  if (geocodeCache[locationStr] !== undefined) return geocodeCache[locationStr];
  if (isPlusCode(locationStr)) return geocodePlusCode(locationStr);
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(locationStr)}&format=json&limit=1`;
    const res  = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();
    if (!data.length) { geocodeCache[locationStr] = false; try { localStorage.setItem('geocodeCache', JSON.stringify(geocodeCache)); } catch {} return null; }
    const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
    geocodeCache[locationStr] = coords;
    try { localStorage.setItem('geocodeCache', JSON.stringify(geocodeCache)); } catch {}
    persistGeocodeToDb(locationStr, coords);
    if (locationEnabled) render();
    return coords;
  } catch (e) {
    geoError = `Geocoding failed: ${e.message}`;
    render();
    return null;
  }
}

function fetchPosition() {
  navigator.geolocation.getCurrentPosition(
    pos => {
      currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      geoError = null;
      // Auto-complete travel card if within 1km of destination
      const ctx = scheduleContext();
      if (ctx.current?.type === 'travel' && ctx.current?.icon !== 'plane') {
        const cache = travelDistCache[ctx.current.id];
        if (cache && cache !== 'loading' && cache !== 'error') {
          const remKm = haversineKm(currentPosition.lat, currentPosition.lng, cache.toCoords.lat, cache.toCoords.lng);
          if (remKm < 1) { setStatus(ctx.current.id, 'done'); return; }
        }
      }
      if (locationEnabled) {
        pushUserLocation(currentPosition.lat, currentPosition.lng);
        render();
        if (mapFlyOnNextFix && mapInstance && document.getElementById('mapOverlay')?.classList.contains('open')) {
          mapFlyOnNextFix = false;
          mapInstance.flyTo({ center: [currentPosition.lng, currentPosition.lat], zoom: 17 });
        }
      }
    },
    (err) => {
      geoWatchId = null; currentPosition = null;
      geoError = err.code === 1
        ? 'Location denied — enable it in Settings → Privacy & Security → Location Services'
        : 'Could not get location. Try again.';
      if (geoWatchId !== null) { clearInterval(geoWatchId); geoWatchId = null; }
      render();
    },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

function startGeoWatch(intervalMs = 300000) {
  if (geoWatchId !== null) { clearInterval(geoWatchId); geoWatchId = null; }
  fetchPosition();
  geoWatchId = setInterval(fetchPosition, intervalMs);
}

window.mapNavAction = async () => {
  if (!locationEnabled) {
    mapFlyOnNextFix = true;
    await window.toggleGlobalLocation();
    return;
  }
  if (currentPosition && mapInstance) {
    mapInstance.flyTo({ center: [currentPosition.lng, currentPosition.lat], zoom: 17 });
  } else {
    // GPS not resolved yet — fly as soon as the next fix arrives
    mapFlyOnNextFix = true;
    fetchPosition();
  }
};

window.mapZoomNeighbourhood = () => {
  if (!mapInstance) return;
  if (mapInstance.getZoom() < 13 && lastCityCenter) {
    mapInstance.flyTo({ center: lastCityCenter, zoom: 13, duration: 800 });
  } else {
    mapInstance.flyTo({ zoom: 13, duration: 600 });
  }
};

// ── Map Locations panel ──────────────────────────────
let mapLocEditMode = false;

window.toggleMapLocEdit = () => {
  mapLocEditMode = !mapLocEditMode;
  const btn = document.getElementById('mapLocEditBtn');
  btn?.classList.toggle('active', mapLocEditMode);
  // Open the panel if not already open
  const panel = document.getElementById('mapLocationsPanel');
  if (mapLocEditMode && !panel.classList.contains('open')) {
    toggleMapLocations();
  }
  document.getElementById('mapLocAddForm').style.display = mapLocEditMode ? '' : 'none';
  renderMapLocations();
};

function renderMapLocations() {
  const list = document.getElementById('mapLocList');
  if (!list) return;

  if (mapLocEditMode) {
    // Edit mode: only custom map location notes
    const locs = notes.filter(isLocNote);
    if (!locs.length) { list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:13px">No custom locations yet.</div>'; return; }
    list.innerHTML = locs.map(n => {
      const label = n.notes || n.title.split(',')[0].trim();
      const c = geocodeCache[n.title];
      const dist = (c && c !== false && currentPosition) ? haversineKm(currentPosition.lat, currentPosition.lng, c.lat, c.lng) : null;
      const distText = dist != null ? formatKm(dist) : '';
      const addr = encodeURIComponent(n.title);
      return `<div class="map-loc-row" data-id="${n.id}" style="cursor:pointer" onclick="if(!event.target.closest('button')){flyToAddress(decodeURIComponent('${addr}'));}">
        <div class="map-loc-icon-wrap" style="color:${locColor(n.icon||'map-pin')};background:${locColor(n.icon||'map-pin')}22;border:1.5px solid ${locColor(n.icon||'map-pin')}">${iconHtml(n.icon || 'map-pin')}</div>
        <div class="map-loc-info">
          <div class="map-loc-name">${escHtml(label)}</div>
          <div class="map-loc-addr">${escHtml(n.title)}</div>
        </div>
        ${distText ? `<div class="map-loc-dist">${escHtml(distText)}</div>` : ''}
        <div class="map-loc-actions">
          <button class="map-loc-btn" onclick="toggleNoteHidden('${n.id}')" title="${n.hidden === false ? 'Unpin' : 'Pin'}" style="${n.hidden === false ? 'color:var(--accent)' : ''}"><i data-lucide="${n.hidden === false ? 'pin' : 'pin-off'}"></i></button>
          <button class="map-loc-btn" onclick="startEditMapLoc('${n.id}')" title="Edit"><i data-lucide="pencil"></i></button>
          <button class="map-loc-btn" onclick="deleteNote('${n.id}')" title="Delete" style="color:var(--red)"><i data-lucide="trash-2"></i></button>
        </div>
      </div>`;
    }).join('');
  } else {
    // Normal mode: grouped by category, sorted by distance within each group
    const pts = collectMapPoints().slice().sort((a, b) => (a.dist ?? Infinity) - (b.dist ?? Infinity));
    if (!pts.length) { list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:13px">No locations.</div>'; return; }
    // Group preserving LOC_ICONS order
    const groups = {};
    for (const pt of pts) {
      const key = pt.icon || 'map-pin';
      if (!groups[key]) groups[key] = [];
      groups[key].push(pt);
    }
    const orderedKeys = LOC_ICONS.filter(ic => groups[ic]);
    list.innerHTML = orderedKeys.map(key => {
      const color = locColor(key);
      const label = LOC_CATEGORY_LABELS[key] || key;
      const rows = groups[key].map(pt => {
        const distText = pt.dist != null ? formatKm(pt.dist) : '';
        const addr = pt.addr || '';
        return `<div class="map-loc-row" onclick="flyToAddress(decodeURIComponent('${encodeURIComponent(addr || pt.label)}')); toggleMapLocations();">
          <div class="map-loc-icon-wrap" style="color:${locColor(pt.icon||'map-pin')};background:${locColor(pt.icon||'map-pin')}22;border:1.5px solid ${locColor(pt.icon||'map-pin')}">${iconHtml(pt.icon || 'map-pin')}</div>
          <div class="map-loc-info">
            <div class="map-loc-name">${escHtml(pt.label)}</div>
            ${addr ? `<div class="map-loc-addr">${escHtml(addr)}</div>` : ''}
          </div>
          ${distText ? `<div class="map-loc-dist">${escHtml(distText)}</div>` : ''}
        </div>`;
      }).join('');
      return `<div class="map-loc-category-header" style="color:${color};border-color:${color}22">
        <span class="map-loc-category-icon" style="color:${color}">${iconHtml(key)}</span>
        ${escHtml(label)}
      </div>${rows}`;
    }).join('');
  }

  lucide.createIcons({ nodes: [list] });
}

function iconPickerHtml(selectedIcon, prefix) {
  return `<div class="loc-icon-picker">${LOC_ICONS.map(ic => `
    <div class="loc-icon-opt${ic === selectedIcon ? ' selected' : ''}" data-icon="${ic}" onclick="selectLocIcon(this,'${prefix}')">
      ${iconHtml(ic)}
    </div>`).join('')}</div>`;
}

window.selectLocIcon = (el, prefix) => {
  el.closest('.loc-icon-picker').querySelectorAll('.loc-icon-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  const hidden = document.getElementById(prefix + '_icon');
  if (hidden) hidden.value = el.dataset.icon;
};

window.startEditMapLoc = (id) => {
  const n = notes.find(n => n.id == id);
  if (!n) return;
  const row = document.querySelector(`.map-loc-row[data-id="${id}"]`);
  if (!row) return;
  row.classList.add('editing');
  row.innerHTML = `
    <div class="map-loc-edit-fields">
      ${iconPickerHtml(n.icon || 'map-pin', `edit_${id}`)}
      <input type="hidden" id="edit_${id}_icon" value="${n.icon || 'map-pin'}" />
      <input id="editLocName_${id}" value="${escHtml(n.notes || '')}" placeholder="Display name…" />
      <div style="position:relative">
        <input id="editLocAddr_${id}" value="${escHtml(n.title)}" placeholder="Address…" autocomplete="off" />
        <div class="loc-suggestions" id="editLocAddrSuggestions_${id}" style="display:none"></div>
      </div>
    </div>
    <div class="map-loc-edit-actions">
      <button onclick="renderMapLocations()">Cancel</button>
      <button class="save-btn" onclick="saveEditMapLoc('${id}')">Save</button>
    </div>`;
  lucide.createIcons({ nodes: [row] });
  attachLocAutocomplete(`editLocAddr_${id}`, `editLocAddrSuggestions_${id}`);
};

window.saveEditMapLoc = async (id) => {
  const n = notes.find(n => n.id == id);
  if (!n) return;
  const icon = document.getElementById(`edit_${id}_icon`)?.value || 'map-pin';
  const name = document.getElementById(`editLocName_${id}`)?.value.trim();
  const addr = document.getElementById(`editLocAddr_${id}`)?.value.trim();
  if (!addr) return;
  n.title = addr; n.notes = name || null; n.icon = icon;
  renderMapLocations();
  refreshMapMarkers();
  if (!DEMO_MODE) await sb.from('events').update({ title: addr, notes: name || null, icon }).eq('id', id);
  if (geocodeCache[addr] === undefined) { await geocode(addr); refreshMapMarkers(); }
};

window.addMapLocation = async () => {
  const addr = document.getElementById('mapLocAddr')?.value.trim();
  const name = document.getElementById('mapLocName')?.value.trim();
  const icon = document.getElementById('mapLocIcon')?.value || 'map-pin';
  if (!addr) return;
  const obj = { trip_id: TRIP_ID, type: 'note', icon, title: addr, notes: name || null, hidden: true, start_at: new Date().toISOString() };
  if (!DEMO_MODE) {
    const { data, error } = await sb.from('events').insert(obj).select().single();
    if (error) { alert('Failed: ' + error.message); return; }
    notes.push(data);
  } else {
    notes.push({ ...obj, id: Date.now() });
  }
  document.getElementById('mapLocAddr').value = '';
  document.getElementById('mapLocName').value = '';
  // Reset picker to map-pin
  document.querySelectorAll('#mapLocationsPanel .map-loc-add .loc-icon-opt').forEach(o => o.classList.toggle('selected', o.dataset.icon === 'map-pin'));
  document.getElementById('mapLocIcon').value = 'map-pin';
  await geocode(addr);
  renderMapLocations();
  refreshMapMarkers();
};

window.toggleMapLocations = () => {
  const panel = document.getElementById('mapLocationsPanel');
  const btn = document.getElementById('mapLocBtn');
  const isOpen = panel.classList.toggle('open');
  btn?.classList.toggle('active', isOpen);
  if (isOpen) {
    // Render add-form icon picker once
    const picker = document.getElementById('mapLocIconPicker');
    if (picker && !picker.hasChildNodes()) {
      const defaultIcon = LOC_ICONS[0];
      picker.innerHTML = iconPickerHtml(defaultIcon, 'mapLocAdd');
      document.getElementById('mapLocIcon').value = defaultIcon;
      picker.querySelectorAll('.loc-icon-opt').forEach(el => {
        el.onclick = () => {
          picker.querySelectorAll('.loc-icon-opt').forEach(o => o.classList.remove('selected'));
          el.classList.add('selected');
          document.getElementById('mapLocIcon').value = el.dataset.icon;
        };
      });
      lucide.createIcons({ nodes: [picker] });
    }
    renderMapLocations();
  } else {
    mapLocEditMode = false;
    document.getElementById('mapLocEditBtn')?.classList.remove('active');
    document.getElementById('mapLocAddForm').style.display = 'none';
  }
};

window.flyToAddress = async (locStr) => {
  const cached = geocodeCache[locStr];
  const coords = (cached && cached !== false) ? cached : await geocode(locStr);
  if (!coords) return;
  await toggleMap(true);
  if (!mapInstance) return;
  const fly = () => mapInstance.flyTo({ center: [coords.lng, coords.lat], zoom: 17 });
  if (mapInstance.loaded()) {
    fly();
  } else {
    mapInstance.once('load', fly);
  }
};

window.mapZoomOut = () => {
  if (!mapInstance) return;
  const pts = collectMapPoints();
  const users = userLocations.map(u => [u.lng, u.lat]);
  const all = [...pts.map(p => [p.lng, p.lat]), ...users];
  if (all.length < 2) {
    mapInstance.flyTo({ zoom: 11, duration: 600 });
    return;
  }
  const bounds = new maplibregl.LngLatBounds();
  all.forEach(c => bounds.extend(c));
  mapInstance.fitBounds(bounds, { padding: 80, maxZoom: 14, duration: 800 });
};

window.toggleGlobalLocation = async () => {
  if (locationEnabled) {
    locationEnabled = false;
    localStorage.removeItem('locationEnabled');
    geoError = null;
    if (geoWatchId !== null) { clearInterval(geoWatchId); geoWatchId = null; }
    document.getElementById('navBtn')?.classList.remove('active');
    document.getElementById('mapNavBtn')?.classList.remove('active');
    render();
    return;
  }
  if (!userName) {
    const n = prompt('Your name (shown on the map for others):');
    if (!n?.trim()) return;
    userName = n.trim();
    localStorage.setItem('userName', userName);
  }
  locationEnabled = true;
  localStorage.setItem('locationEnabled', '1');
  document.getElementById('navBtn')?.classList.add('active');
  document.getElementById('mapNavBtn')?.classList.add('active');
  render(); // populates locationLookup, shows cached distances immediately if position known
  if (!navigator.geolocation) { geoError = 'Geolocation not supported.'; render(); return; }
  geoError = null;
  startGeoWatch();
  // Geocode all locations; re-render after each resolves so distances appear as soon as both GPS + geocode are ready
  await Promise.all(Object.values(locationLookup).map(async locStr => {
    await geocode(locStr);
    if (locationEnabled && currentPosition) render();
  }));
};

async function initTravelDist(ev) {
  if (travelDistCache[ev.id]) return;
  travelDistCache[ev.id] = 'loading';
  const parts = ev.title.split(/\s*->\s*/);
  if (parts.length < 2) { travelDistCache[ev.id] = 'error'; return; }
  const [fromCoords, toCoords] = await Promise.all([geocode(parts[0].trim()), geocode(parts.slice(1).join(' -> ').trim())]);
  if (!fromCoords || !toCoords) { travelDistCache[ev.id] = 'error'; return; }
  const totalKm = haversineKm(fromCoords.lat, fromCoords.lng, toCoords.lat, toCoords.lng);
  travelDistCache[ev.id] = { totalKm, fromCoords, toCoords };
  render();
}


// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────

function updateDotOnlineState() {
  const dot = document.getElementById('refreshDotInline');
  if (!dot) return;
  if (navigator.onLine) {
    dot.classList.remove('offline');
  } else {
    dot.classList.add('offline');
  }
}
window.addEventListener('online',  updateDotOnlineState);
window.addEventListener('offline', updateDotOnlineState);

loadEvents();
startTick();
startRefresh();
lucide.createIcons();
// Set header height CSS var on load and on resize
function updateHeaderHeight() {
  const header = document.getElementById('appHeader');
  const mapBtn = document.getElementById('mapBtn');
  if (!header) return;
  const h = header.getBoundingClientRect().height;
  document.documentElement.style.setProperty('--header-h', h + 'px');
  if (mapBtn) {
    const r = mapBtn.getBoundingClientRect();
    document.documentElement.style.setProperty('--map-controls-top', r.bottom + 'px');
    document.documentElement.style.setProperty('--map-controls-right', (window.innerWidth - r.right) + 'px');
    document.documentElement.style.setProperty('--map-controls-width', r.width + 'px');
  }
}
updateHeaderHeight();
window.addEventListener('resize', updateHeaderHeight);
if (localStorage.getItem('locationEnabled') && userName) toggleGlobalLocation();
if (localStorage.getItem('mapOpen')) toggleMap();
</script>
